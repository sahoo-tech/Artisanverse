services:
  - type: web
    name: artisanverse-ai-backend
    runtime: node
    repo: https://github.com/sahoo-tech/Artesian-help-application
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: artisanverse-ai-backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://your-frontend-domain.com
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100